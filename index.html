<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SendShot — Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.07);
    --accent: #4f6ef7;
    --accent2: #7c3aed;
    --success: #10b981;
    --error: #ef4444;
    --text: #f0f0f8;
    --muted: #6b6b8a;
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,110,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,110,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(79,110,247,0.08) 0%, transparent 70%);
    top: -200px; left: -100px;
    pointer-events: none;
    z-index: 0;
  }
  .glow2 {
    position: fixed;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,58,237,0.06) 0%, transparent 70%);
    bottom: -100px; right: -100px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 520px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* Header */
  .header {
    margin-bottom: 3rem;
    animation: fadeUp 0.6s ease both;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
  }

  .logo-mark {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .logo-text span {
    color: var(--accent);
  }

  h1 {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 8px;
  }

  h1 em {
    font-style: normal;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 14px;
    color: var(--muted);
    font-weight: 400;
    font-family: var(--mono);
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem;
    margin-bottom: 1rem;
    animation: fadeUp 0.6s ease both;
    transition: border-color 0.2s;
  }

  .card:hover { border-color: rgba(79,110,247,0.2); }
  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.2s; }

  .card-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-label::before {
    content: '';
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* Auth section */
  .auth-section { text-align: center; }

  .btn-microsoft {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 14px 28px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    justify-content: center;
  }

  .btn-microsoft:hover {
    background: rgba(79,110,247,0.1);
    border-color: rgba(79,110,247,0.3);
    transform: translateY(-1px);
  }

  .btn-microsoft svg { flex-shrink: 0; }

  /* Status badge */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-family: var(--mono);
    padding: 4px 10px;
    border-radius: 20px;
    margin-top: 12px;
  }

  .status-badge.connected {
    background: rgba(16,185,129,0.1);
    color: var(--success);
    border: 1px solid rgba(16,185,129,0.2);
  }

  .status-badge.disconnected {
    background: rgba(107,107,138,0.1);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    animation: pulse 2s infinite;
  }

  /* Form */
  .form-group { margin-bottom: 1.25rem; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-family: var(--mono);
  }

  .input-wrap {
    position: relative;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 44px 12px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: all 0.2s;
  }

  input[type="text"]:focus {
    border-color: rgba(79,110,247,0.5);
    box-shadow: 0 0 0 3px rgba(79,110,247,0.1);
  }

  input[type="text"]::placeholder { color: var(--muted); }

  .toggle-vis {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    transition: color 0.2s;
  }

  .toggle-vis:hover { color: var(--text); }

  /* Current key display */
  .key-display {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    word-break: break-all;
    line-height: 1.5;
  }

  .key-display.has-key { color: var(--accent); }

  /* Buttons */
  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: 0.01em;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
  }

  .btn-primary:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(79,110,247,0.3);
  }

  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 13px;
    font-family: var(--mono);
    display: flex;
    align-items: center;
    gap: 10px;
    transition: transform 0.3s ease;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: rgba(16,185,129,0.3); color: var(--success); }
  .toast.error { border-color: rgba(239,68,68,0.3); color: var(--error); }

  /* Loading */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }

  .loading .spinner { display: block; }
  .loading .btn-text { display: none; }

  /* Info row */
  .info-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .info-row:last-child { border-bottom: none; }
  .info-row .key { color: var(--muted); font-family: var(--mono); font-size: 11px; }
  .info-row .val { font-weight: 600; font-family: var(--mono); font-size: 12px; }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="glow"></div>
<div class="glow2"></div>

<div class="container">
  <div class="header">
    <div class="logo">
      <div class="logo-mark">📡</div>
      <div class="logo-text">Send<span>Shot</span></div>
    </div>
    <h1>Painel <em>Admin</em></h1>
    <p class="subtitle">// gerenciamento de configurações</p>
  </div>

  <!-- Auth Card -->
  <div class="card" id="authCard">
    <div class="card-label">Autenticação Microsoft</div>
    <div class="auth-section">
      <button class="btn-microsoft" id="btnLogin" onclick="fazerLogin()">
        <svg width="20" height="20" viewBox="0 0 21 21" fill="none">
          <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
          <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
          <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
          <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
        </svg>
        Entrar com Microsoft
      </button>
      <div id="statusBadge" class="status-badge disconnected">
        <div class="status-dot"></div>
        <span id="statusText">não conectado</span>
      </div>
    </div>
  </div>

  <!-- User Info Card -->
  <div class="card hidden" id="userCard">
    <div class="card-label">Sessão Ativa</div>
    <div class="info-row">
      <span class="key">usuário</span>
      <span class="val" id="userNameDisplay">—</span>
    </div>
    <div class="info-row">
      <span class="key">email</span>
      <span class="val" id="userEmailDisplay">—</span>
    </div>
    <div class="info-row">
      <span class="key">status onedrive</span>
      <span class="val" id="driveStatus">verificando...</span>
    </div>
  </div>

  <!-- API Key Card -->
  <div class="card hidden" id="keyCard">
    <div class="card-label">Chave Google Maps API</div>

    <div class="form-group">
      <label>Chave atual</label>
      <div class="key-display" id="currentKeyDisplay">nenhuma chave cadastrada</div>
    </div>

    <div class="form-group">
      <label>Nova chave de API</label>
      <div class="input-wrap">
        <input type="text" id="apiKeyInput" placeholder="AIzaSy..." autocomplete="off"/>
        <button class="toggle-vis" onclick="toggleVisibility()" title="Mostrar/ocultar">
          <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn btn-primary" id="btnSalvar" onclick="salvarChave()" disabled>
      <div class="spinner"></div>
      <span class="btn-text">💾 Salvar no OneDrive</span>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ─── Config ────────────────────────────────────────────────
  const CLIENT_ID = '47d9b118-15a2-4529-b8ab-5a6b53422a81';
  const TENANT_ID = '307e784e-af82-47ef-8d7b-90bcab8f7e2c';
  const REDIRECT_URI = window.location.href.split('?')[0].split('#')[0];
  const SCOPES = 'User.Read Files.ReadWrite.All Sites.ReadWrite.All';

  // Link da pasta raiz compartilhada — mesmo do app Android
  const LINK_COMPARTILHADO = 'https://supporteng-my.sharepoint.com/:f:/g/personal/diegor_support_com_br/EgpP7WPpB-ZMsomjH5ZjI5cB3UG9uhg3aETb4DCKU6cCGQ';

  const CONFIG_FILE_NAME = 'config.json';
  const GPS_FOLDER_NAME = 'gps';

  let accessToken = null;
  let driveId = null;
  let rootFolderId = null;
  let gpsFolderId = null;
  let configFileId = null;
  let chaveAtual = null;

  // ─── Auth ────────────────────────────────────────────────
  function fazerLogin() {
    const authUrl = `https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/authorize?` +
      `client_id=${CLIENT_ID}&` +
      `response_type=token&` +
      `redirect_uri=${encodeURIComponent(REDIRECT_URI)}&` +
      `scope=${encodeURIComponent(SCOPES)}&` +
      `response_mode=fragment`;
    window.location.href = authUrl;
  }

  function extrairTokenDaUrl() {
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    return params.get('access_token');
  }

  async function buscarUsuario() {
    const resp = await fetch('https://graph.microsoft.com/v1.0/me', {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    return resp.json();
  }

  // ─── OneDrive ────────────────────────────────────────────
  async function resolverLinkCompartilhado() {
    const base64 = btoa(unescape(encodeURIComponent(LINK_COMPARTILHADO)))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    const shareId = `u!${base64}`;
    const resp = await fetch(`https://graph.microsoft.com/v1.0/shares/${shareId}/driveItem`, {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    const data = await resp.json();
    driveId = data?.parentReference?.driveId;
    rootFolderId = data?.id;
    return driveId && rootFolderId;
  }

  async function listarFilhos(folderId) {
    const resp = await fetch(
      `https://graph.microsoft.com/v1.0/drives/${driveId}/items/${folderId}/children`,
      { headers: { Authorization: `Bearer ${accessToken}` } }
    );
    const data = await resp.json();
    return data.value || [];
  }

  async function criarPasta(parentId, nome) {
    const resp = await fetch(
      `https://graph.microsoft.com/v1.0/drives/${driveId}/items/${parentId}/children`,
      {
        method: 'POST',
        headers: {
          Authorization: `Bearer ${accessToken}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          name: nome,
          folder: {},
          '@microsoft.graph.conflictBehavior': 'replace'
        })
      }
    );
    const data = await resp.json();
    return data.id;
  }

  async function lerArquivoJson(fileId) {
    const resp = await fetch(
      `https://graph.microsoft.com/v1.0/drives/${driveId}/items/${fileId}/content`,
      { headers: { Authorization: `Bearer ${accessToken}` } }
    );
    if (!resp.ok) return null;
    return resp.json();
  }

  async function salvarArquivoJson(parentId, nome, conteudo) {
    const blob = new Blob([JSON.stringify(conteudo, null, 2)], { type: 'application/json' });
    const resp = await fetch(
      `https://graph.microsoft.com/v1.0/drives/${driveId}/items/${parentId}:/${nome}:/content`,
      {
        method: 'PUT',
        headers: {
          Authorization: `Bearer ${accessToken}`,
          'Content-Type': 'application/json'
        },
        body: blob
      }
    );
    const data = await resp.json();
    return data.id;
  }

  async function inicializarOneDrive() {
    document.getElementById('driveStatus').textContent = 'conectando...';

    const ok = await resolverLinkCompartilhado();
    if (!ok) {
      document.getElementById('driveStatus').textContent = '❌ erro ao conectar';
      return false;
    }

    // Verifica ou cria pasta gps na raiz compartilhada
    const filhos = await listarFilhos(rootFolderId);
    const pastaGps = filhos.find(f => f.name === GPS_FOLDER_NAME && f.folder);

    if (pastaGps) {
      gpsFolderId = pastaGps.id;
    } else {
      gpsFolderId = await criarPasta(rootFolderId, GPS_FOLDER_NAME);
    }

    // Verifica ou lê config.json
    const arquivos = await listarFilhos(gpsFolderId);
    const configFile = arquivos.find(f => f.name === CONFIG_FILE_NAME);

    if (configFile) {
      configFileId = configFile.id;
      const conteudo = await lerArquivoJson(configFileId);
      chaveAtual = conteudo?.apiKey || null;
    }

    document.getElementById('driveStatus').textContent = '✅ conectado';
    atualizarExibicaoChave();
    return true;
  }

  // ─── UI ─────────────────────────────────────────────────
  function atualizarExibicaoChave() {
    const el = document.getElementById('currentKeyDisplay');
    if (chaveAtual) {
      const mascarada = chaveAtual.substring(0, 8) + '••••••••••••••••' + chaveAtual.slice(-4);
      el.textContent = mascarada;
      el.classList.add('has-key');
    } else {
      el.textContent = 'nenhuma chave cadastrada';
      el.classList.remove('has-key');
    }
  }

  function toggleVisibility() {
    const input = document.getElementById('apiKeyInput');
    input.type = input.type === 'text' ? 'password' : 'text';
  }

  document.getElementById('apiKeyInput').addEventListener('input', function() {
    document.getElementById('btnSalvar').disabled = this.value.trim().length < 10;
  });

  async function salvarChave() {
    const novaChave = document.getElementById('apiKeyInput').value.trim();
    if (!novaChave) return;

    const btn = document.getElementById('btnSalvar');
    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const conteudo = {
        apiKey: novaChave,
        updatedAt: new Date().toISOString(),
        version: Date.now()
      };

      await salvarArquivoJson(gpsFolderId, CONFIG_FILE_NAME, conteudo);
      chaveAtual = novaChave;
      atualizarExibicaoChave();
      document.getElementById('apiKeyInput').value = '';
      btn.disabled = true;
      showToast('✅ Chave salva com sucesso!', 'success');
    } catch (e) {
      showToast('❌ Erro ao salvar: ' + e.message, 'error');
    } finally {
      btn.classList.remove('loading');
    }
  }

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  // ─── Init ────────────────────────────────────────────────
  async function init() {
    const token = extrairTokenDaUrl();
    if (token) {
      accessToken = token;
      window.history.replaceState({}, document.title, window.location.pathname);

      const badge = document.getElementById('statusBadge');
      badge.className = 'status-badge connected';

      const user = await buscarUsuario();
      document.getElementById('userNameDisplay').textContent = user.displayName || '—';
      document.getElementById('userEmailDisplay').textContent = user.mail || user.userPrincipalName || '—';
      document.getElementById('statusText').textContent = user.displayName || 'conectado';

      document.getElementById('userCard').classList.remove('hidden');
      document.getElementById('keyCard').classList.remove('hidden');

      await inicializarOneDrive();
    }
  }

  init();
</script>
</body>
</html>
